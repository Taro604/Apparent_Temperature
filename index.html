<!DOCTYPE html>
<html>
<head>
    <title>Apparent Temperature Calculator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        input {
            padding: 8px;
            margin: 5px;
            width: 120px;
        }
        button {
            padding: 10px 15px;
            margin-top: 10px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Apparent Temperature Calculator</h2>

    <div>
        <input type="number" id="temp" placeholder="Temperature (°C)">
        <br>
        <input type="number" id="humidity" placeholder="Humidity (%)">
        <br>
        <button onclick="calculate()">Calculate</button>
    </div>

    <div id="result"></div>

    <script>
        function calculate() {
            let T = parseFloat(document.getElementById("temp").value);
            let RH = parseFloat(document.getElementById("humidity").value);

            if (isNaN(T) || isNaN(RH)) {
                document.getElementById("result").innerText = "Please enter valid numbers!";
                return;
            }

            // Apparent Temperature formula (simplified heat index approximation)
            let AT = -8.784695 +
                     1.61139411 * T +
                     2.338549 * RH +
                    -0.14611605 * T * RH +
                    -0.012308094 * T * T +
                    -0.016424828 * RH * RH +
                     0.002211732 * T * T * RH +
                     0.00072546 * T * RH * RH +
                    -0.000003582 * T * T * RH * RH;

            document.getElementById("result").innerText =
                "Apparent Temperature: " + AT.toFixed(2) + " °C";
        }
    </script>

</body>
</html>
